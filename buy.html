<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Buy Now - DigitalToolsNepal</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <img src="logo.png" alt="DigitalToolsNepal logo">
    <h1>DigitalToolsNepal</h1>
  </div>
  <a class="back-link" href="index.html">← Back Home</a>
</header>

<section class="checkout-page">
  <div class="checkout-card">
    <div class="checkout-product">
      <img id="productImage" src="netflix.jpg" alt="">
      <div>
        <p class="category" id="productCategory">DIGITAL PRODUCT</p>
        <h2 id="productTitle">Netflix Premium Subscription in Nepal</h2>
      </div>
    </div>

    <label>Select Option</label>
    <select id="planSelect"></select>

    <label>Quantity</label>
    <div class="qty">
      <button onclick="changeQty(-1)">−</button>
      <input id="qty" value="1" readonly>
      <button onclick="changeQty(1)">+</button>
    </div>

    <div class="summary-box">
      <div><span>Plan Price</span><strong id="planPrice">NPR 0</strong></div>
      <div><span>Quantity</span><strong id="qtyText">1</strong></div>
      <div class="total"><span>Total</span><strong id="totalPrice">NPR 0</strong></div>
    </div>

    <div class="qr-box">
      <h3>Khalti QR</h3>
      <p>QR Coming Soon</p>
    </div>

    <button class="place-order" onclick="placeOrder()">PLACE ORDER</button>
    <p class="help">Need help? Call / WhatsApp: 9860203327</p>
  </div>
</section>

<script>
const PRODUCTS = {
  "netflix": {
    title: "Netflix Premium Subscription in Nepal",
    img: "netflix.jpg",
    options: [{label:"2 Months", price:549}, {label:"3 Months", price:799}, {label:"6 Months", price:1349}, {label:"9 Months", price:1749}, {label:"12 Months", price:2399}]
  },
  "chatgpt": {
    title: "ChatGPT Plus Premium AI Access",
    img: "chatgpt.jpg",
    options: [{label:"1 Month", price:499}, {label:"2 Months", price:999}, {label:"3 Months", price:1399}, {label:"6 Months", price:2499}, {label:"12 Months", price:4649}]
  },
  "claude": {
    title: "Claude AI MAX Plans",
    img: "claude.jpg",
    options: [{label:"MAX 5x Plan - 3 Months", price:5499}, {label:"MAX 20x Plan - 3 Months", price:17000}]
  },
  "gemini": {
    title: "Gemini AI Pro 5TB 18 Months",
    img: "gemini.jpg",
    options: [{label:"5TB 18 Months Own Email", price:2899}, {label:"5TB 18 Months Family Invite", price:1899}]
  },
  "youtube": {
    title: "YouTube Premium 12 Months",
    img: "youtube.jpg",
    options: [{label:"12 Months", price:1999}]
  },
  "spotify": {
    title: "Spotify Premium Individual Plan",
    img: "spotify.jpg",
    options: [{label:"6 Months Individual", price:1499}, {label:"1 Year Individual", price:2999}]
  }
};

const params = new URLSearchParams(location.search);
let current = params.get("product") || "netflix";
if(!PRODUCTS[current]) current = "netflix";
let qty = 1;

function money(n) {
  return "NPR " + Number(n).toLocaleString();
}

function loadProduct() {
  const p = PRODUCTS[current];
  document.getElementById("productImage").src = p.img;
  document.getElementById("productTitle").innerText = p.title;
  const select = document.getElementById("planSelect");
  select.innerHTML = "";
  p.options.forEach(o => {
    const option = document.createElement("option");
    option.value = o.price;
    option.textContent = o.label + " - " + money(o.price);
    select.appendChild(option);
  });
  select.addEventListener("change", updateTotal);
  updateTotal();
}

function changeQty(v) {
  qty = Math.max(1, qty + v);
  document.getElementById("qty").value = qty;
  updateTotal();
}

function updateTotal() {
  const price = Number(document.getElementById("planSelect").value || 0);
  document.getElementById("planPrice").innerText = money(price);
  document.getElementById("qtyText").innerText = qty;
  document.getElementById("totalPrice").innerText = money(price * qty);
}

function placeOrder() {
  alert("Order noted. Please contact DigitalToolsNepal at 9860203327 for payment confirmation.");
}

loadProduct();
</script>
</body>
</html>
